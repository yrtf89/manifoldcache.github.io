window.addEventListener('load', function() {
    const configs = [
        {
            id: "mol-viewer-1",
            style: { stick: { radius: 0.15, colorscheme: "Jmol" } },
            surface: false,
            bg: "#0a0a1a"
        },
        {
            id: "mol-viewer-2",
            style: { sphere: { scale: 0.35, colorscheme: "Jmol" } },
            surface: false,
            bg: "#0a0a1a"
        },
        {
            id: "mol-viewer-3",
            style: { stick: { radius: 0.12, colorscheme: "Jmol" } },
            surface: true,
            bg: "#0a0a1a"
        },
        {
            id: "mol-viewer-4",
            style: { line: { colorscheme: "Jmol", linewidth: 2 } },
            surface: false,
            bg: "#0a0a1a"
        }
    ];

    configs.forEach(function(cfg) {
        var el = document.getElementById(cfg.id);
        if (!el) return;

        var viewer = $3Dmol.createViewer(el, {
            backgroundColor: cfg.bg,
            antialias: true
        });

        viewer.addModel(SDF_DATA, "sdf");
        viewer.setStyle({}, cfg.style);

        if (cfg.surface) {
            viewer.addSurface($3Dmol.SurfaceType.VDW, {
                opacity: 0.45,
                color: "lightblue"
            });
        }

        viewer.zoomTo();
        viewer.spin("y", 1);
        viewer.render();
    });
