<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManifoldCache Demo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            text-align: center;
        }

        .demo-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1400px;
            flex-grow: 1;
        }

        .viewer-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            height: 65vh;
        }

        .canvas-wrapper {
            flex-grow: 1;
            width: 100%;
            position: relative;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .caption {
            margin-top: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        .sub-caption {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
            text-align: center;
        }
    </style>
    <!-- Sourcing the requested version 0.21.2 library file -->
    <script src="https://unpkg.com/@niivue/niivue@0.21.2/dist/niivue.umd.js"></script>
</head>
<body>

    <h1>ManifoldCache</h1>
    <div class="subtitle">Training-Free Diffusion Acceleration via Constraint Manifold Caching</div>

    <div class="demo-container">
        <!-- Left Viewer: ManifoldCache -->
        <div class="viewer-card">
            <div class="canvas-wrapper">
                <canvas id="canvas-manifold"></canvas>
            </div>
            <div class="caption">ManifoldCache (Ours)</div>
            <div class="sub-caption">File: manifoldcache_flair.nii.gz | Drag to rotate, scroll to zoom</div>
        </div>

        <!-- Right Viewer: DeepCache -->
        <div class="viewer-card">
            <div class="canvas-wrapper">
                <canvas id="canvas-deepcache"></canvas>
            </div>
            <div class="caption">DeepCache</div>
            <div class="sub-caption">File: deepcache_flair.nii.gz | Drag to rotate, scroll to zoom</div>
        </div>
    </div>

    <script>
        // Configuration initialization options for older 0.21.2 engine versions
        var niivueOptions = {
            loadingText: 'Loading 3D Volume...',
            backColor: [0, 0, 0, 1], 
            isColorbar: false,
        };

        // 1. Initialize and attach Left Viewer (ManifoldCache)
        var nvManifold = new niivue.Niivue(niivueOptions);
        nvManifold.attachTo('canvas-manifold');

        // FIXED: Added missing volume header and image structure bindings mapping specs
        var volumeManifold = [{
            url: "./manifoldcache_flair.nii.gz",
            volume: {hdr: null, img: null},
            name: "manifoldcache_flair",
            colorMap: "gray",
            opacity: 1,
            visible: true
        }];

        // Load the Left dataset and force full 3D layout rendering configuration mode
        nvManifold.loadVolumes(volumeManifold);
        nvManifold.setSliceType(nvManifold.sliceTypeRender); 

        // 2. Initialize and attach Right Viewer (DeepCache)
        var nvDeepcache = new niivue.Niivue(niivueOptions);
        nvDeepcache.attachTo('canvas-deepcache');

        // FIXED: Added missing volume header and image structure bindings mapping specs
        var volumeDeepcache = [{
            url: "./deepcache_flair.nii.gz",
            volume: {hdr: null, img: null},
            name: "deepcache_flair",
            colorMap: "gray",
            opacity: 1,
            visible: true
        }];

        // Load the Right dataset and force full 3D layout rendering configuration mode
        nvDeepcache.loadVolumes(volumeDeepcache);
        nvDeepcache.setSliceType(nvDeepcache.sliceTypeRender); 

        // Synchronize manual mouse rotation controls symmetrically between the views
        nvManifold.broadcastTo(nvDeepcache);
        nvDeepcache.broadcastTo(nvManifold);
    </script>
</body>
</html>
