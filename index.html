<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManifoldCache Demo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            text-align: center;
        }

        .demo-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1400px;
            flex-grow: 1;
        }

        .viewer-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            height: 65vh;
        }

        .canvas-wrapper {
            flex-grow: 1;
            width: 100%;
            position: relative;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .caption {
            margin-top: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        .sub-caption {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>ManifoldCache</h1>
    <div class="subtitle">Training-Free Diffusion Acceleration via Constraint Manifold Caching</div>

    <div class="demo-container">
        <!-- Left Viewer: ManifoldCache -->
        <div class="viewer-card">
            <div class="canvas-wrapper">
                <canvas id="canvas-manifold"></canvas>
            </div>
            <div class="caption">ManifoldCache (Ours)</div>
            <div class="sub-caption">File: manifoldcache_flair.nii.gz | Drag to rotate, scroll to zoom</div>
        </div>

        <!-- Right Viewer: DeepCache -->
        <div class="viewer-card">
            <div class="canvas-wrapper">
                <canvas id="canvas-deepcache"></canvas>
            </div>
            <div class="caption">DeepCache</div>
            <div class="sub-caption">File: deepcache_flair.nii.gz | Drag to rotate, scroll to zoom</div>
        </div>
    </div>

    <!-- Official ESM Sourcing Pipeline matching your documentation structure -->
    <script type="module" async>
        import { Niivue } from "https://unpkg.com/@niivue/niivue@0.57.0/dist/index.js"

        // Build absolute safe paths to resolve GitHub Pages subfolders automatically
        const currentPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        const rootUrl = `${window.location.origin}${currentPath}`;

        const volumeManifold = [
            { url: `${rootUrl}/manifoldcache_flair.nii.gz` }
        ];

        const volumeDeepcache = [
            { url: `${rootUrl}/deepcache_flair.nii.gz` }
        ];

        // 1. Setup Left Viewer (ManifoldCache)
        const nvManifold = new Niivue({ isResizeCanvas: true });
        nvManifold.setSliceType(nvManifold.sliceTypeRender); // Force 3D Render View
        await nvManifold.attachTo("canvas-manifold");
        await nvManifold.loadVolumes(volumeManifold);

        // 2. Setup Right Viewer (DeepCache)
        const nvDeepcache = new Niivue({ isResizeCanvas: true });
        nvDeepcache.setSliceType(nvDeepcache.sliceTypeRender); // Force 3D Render View
        await nvDeepcache.attachTo("canvas-deepcache");
        await nvDeepcache.loadVolumes(volumeDeepcache);

        // Sync views so they rotate together
        nvManifold.broadcastTo([nvDeepcache], { "2d": false, "3d": true });
        nvDeepcache.broadcastTo([nvManifold], { "2d": false, "3d": true });
    </script>
</body>
</html>
